name: Build MSI (Tauri)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect launcher directory
        id: paths
        shell: pwsh
        run: |
          if (Test-Path (Join-Path $env:GITHUB_WORKSPACE 'LAUNCHER\package.json')) {
            "workdir=LAUNCHER" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "workdir=." | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install WiX
        run: choco install wixtoolset --no-progress -y

      - name: Install dependencies
        working-directory: ${{ steps.paths.outputs.workdir }}
        run: npm ci

      - name: Build MSI
        working-directory: ${{ steps.paths.outputs.workdir }}
        run: npm run tauri -- build --bundles msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: |
            ${{ steps.paths.outputs.workdir }}/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.paths.outputs.workdir }}/src-tauri/target/release/bundle/msi/*.msi
